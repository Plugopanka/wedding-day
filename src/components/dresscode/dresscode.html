<!-- Блок с дресскодом -->
<section class="section dresscode-section" id="dresscode">
    <div class="section-header">
      <div class="pixel-corner pixel-corner--tl">◤</div>
      <h2>ИНВЕНТАРЬ</h2>
      <div class="pixel-corner pixel-corner--tr">◥</div>
      <div class="pixel-corner pixel-corner--bl">◣</div>
      <div class="pixel-corner pixel-corner--br">◢</div>
  </div>

    <p class="dresscode-subtitle">
        <span class="quest-marker">▶</span>
        Ваше присутствие - это уже красиво!
        <span class="quest-marker">◀</span>
    </p>

    <div class="dresscode-wrapper">
        <!-- Карточка с коллажем 1 -->
        <div class="dress-card">
            <div class="dress-card__header">
                <span class="dress-card__title">ВАЙБ</span>
            </div>

            <div class="dress-image-wrapper">
                <div class="dress-image-inner">
                    <img src="/src/assets/dresscode-blur.jpg" alt="Тёплая палитра" class="dress-image main-image">
                    <img src="/src/assets/dresscode-clear.jpg" alt="Тёплая палитра" class="dress-image hover-image">
                </div>
                <div class="pixel-overlay"></div>
            </div>

            <div class="dress-card__stats">
                <div class="stat">
                    <span class="stat-icon"><img src="/src/assets/disco-ball.png" alt=""></span>
                    <span class="stat-label">ЭФФЕКТ:</span>
                    <span class="stat-value">+100 к фотогеничности</span>
                </div>
            </div>

            <div class="dress-card__footer">
                <span class="item-slot">Узоры и текстуры - это круто!</span>
            </div>
        </div>

        <!-- Карточка с коллажем 2 -->
        <div class="dress-card">
            <div class="dress-card__header">
                <span class="dress-card__title">ТОЖЕ ВАЙБ, НО НА БЕЛОМ ФОНЕ</span>
            </div>

            <div class="dress-image-wrapper">
                <div class="dress-image-inner">
                    <img src="/src/assets/dresscode-white-blur.jpg" alt="Нежные оттенки" class="dress-image main-image">
                    <img src="/src/assets/dresscode-white-clear.jpg" alt="Нежные оттенки" class="dress-image hover-image">
                </div>
                <div class="pixel-overlay"></div>
            </div>

            <div class="dress-card__stats">
                <div class="stat">
                    <span class="stat-icon"><img src="/src/assets/crown.png" alt=""></span>
                    <span class="stat-label">ЭФФЕКТ:</span>
                    <span class="stat-value">+50 к эстетике</span>
                </div>
            </div>

            <div class="dress-card__footer">
                <span class="item-slot">Выбирайте любые яркие цвета</span>
            </div>
        </div>
    </div>

    <!-- Баннер-предупреждение -->
    <div class="warning-banner">
        <div class="warning-text">
            <span class="warning-desc">Полностью чёрный и белый скины заблокированы разработчиками</span>
        </div>
        <span class="warning-icon"><img src="/src/assets/warning-sign.png" alt=""></span>
    </div>
</section>
